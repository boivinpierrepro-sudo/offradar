<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OffRadar : playlists Spotify de découverte</title>
  <meta name="description" content="OffRadar part de ton historique d'écoute Spotify pour dénicher tes prochains artistes préférés. Une playlist unique à chaque fois." />
  <meta property="og:title" content="OffRadar : playlists Spotify de découverte" />
  <meta property="og:description" content="De vraies découvertes musicales, pas du réchauffé. À partir de ton écoute Spotify." />
  <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16.png" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    :root {
      --bg:#0c0c0e; --card:#161618; --border:#2a2a2e; --fg:#ededef; --muted:#9a9aa2;
      --primary:#1ed760; --primary-hover:#1fdf64; --primary-fg:#00120a; --radius:14px;
    }
    * { box-sizing:border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,sans-serif;
      background:radial-gradient(1100px 620px at 50% -12%, #15241b 0%, var(--bg) 58%); color:var(--fg);
      line-height:1.55; min-height:100vh; }
    a { color:inherit; }
    .wrap { width:100%; max-width:960px; margin:0 auto; padding:34px 18px 56px; }
    .topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
    .entete { display:flex; align-items:center; gap:13px; }
    .entete svg { width:44px; height:44px; color:var(--primary); }
    .entete h1 { font-size:25px; font-weight:850; margin:0; letter-spacing:-0.02em; }
    .lang { display:flex; gap:4px; }
    .lang button { background:transparent; border:1px solid var(--border); color:var(--muted); border-radius:8px;
      padding:4px 9px; font-size:12px; font-weight:700; cursor:pointer; }
    .lang button.actif { background:#1d1d20; color:var(--fg); border-color:var(--fg); }

    .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; border:none; border-radius:9999px;
      padding:13px 26px; font-size:15px; font-weight:700; cursor:pointer; text-decoration:none; font-family:inherit; transition:transform .1s,background .15s; }
    .btn-primary { background:var(--primary); color:var(--primary-fg); }
    .btn-primary:hover { background:var(--primary-hover); transform:scale(1.03); }
    .btn-ghost { background:transparent; color:var(--fg); border:1px solid var(--border); }
    .btn-ghost:hover { background:#1d1d20; }
    .btn-bloc { width:100%; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:18px; }

    /* ---------- Landing ---------- */
    .hero { text-align:center; padding:44px 8px 26px; }
    .eyebrow { display:inline-block; background:#10231a; border:1px solid #1c3b2a; color:#7ee2a8; border-radius:9999px;
      padding:5px 13px; font-size:12.5px; font-weight:700; margin-bottom:18px; }
    .hero h2 { font-size:42px; line-height:1.07; font-weight:850; letter-spacing:-0.03em; margin:0 auto 16px; max-width:16ch; }
    .hero p.sub { color:var(--muted); font-size:17px; max-width:52ch; margin:0 auto 24px; }
    .cta-row { display:flex; flex-direction:column; align-items:center; gap:14px; }
    .dl-buttons { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
    .req { display:inline-flex; align-items:flex-start; gap:9px; text-align:left; background:#16140c; border:1px solid #3a3115;
      color:#e7d9a8; border-radius:12px; padding:11px 15px; font-size:13.5px; max-width:46ch; line-height:1.45; }
    .req i { color:#f0c453; font-size:18px; margin-top:1px; flex-shrink:0; }
    .req b { color:#fbe9b8; }
    .cta-note { color:var(--muted); font-size:13px; }
    .cta-note b { color:var(--fg); }

    .section-titre { text-align:center; font-size:13px; font-weight:800; letter-spacing:.14em; text-transform:uppercase;
      color:var(--muted); margin:56px 0 22px; }
    .steps { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
    .step { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:20px; }
    .step .num { width:30px; height:30px; border-radius:9999px; background:#10231a; border:1px solid #1c3b2a; color:var(--primary);
      display:flex; align-items:center; justify-content:center; font-weight:800; font-size:15px; margin-bottom:12px; }
    .step h3 { font-size:16px; margin:0 0 5px; }
    .step p { color:var(--muted); font-size:14px; margin:0; }

    .features { display:grid; grid-template-columns:repeat(auto-fit, minmax(210px,1fr)); gap:14px; }
    .feat { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:20px; }
    .feat .ic { color:var(--primary); margin-bottom:11px; display:block; line-height:1; }
    .feat .ic i { font-size:30px; }
    .feat h3 { font-size:15.5px; margin:0 0 4px; }
    .feat p { color:var(--muted); font-size:13.5px; margin:0; }

    /* ---------- FAQ ---------- */
    .faq { max-width:760px; margin:0 auto; }
    details { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:0 18px; margin-bottom:10px; }
    details[open] { border-color:#2f5a40; }
    summary { list-style:none; cursor:pointer; font-weight:700; font-size:15px; padding:16px 0; display:flex;
      justify-content:space-between; align-items:center; gap:12px; }
    summary::-webkit-details-marker { display:none; }
    summary::after { content:'+'; color:var(--primary); font-size:20px; font-weight:700; transition:transform .15s; }
    details[open] summary::after { content:'−'; }
    details .ans { color:var(--muted); font-size:14px; padding:0 0 16px; margin:0; }
    details .ans a { color:var(--primary); }

    .band { margin-top:56px; text-align:center; background:linear-gradient(180deg,#13211a,#101013);
      border:1px solid #1c3b2a; border-radius:18px; padding:38px 20px; }
    .band h3 { font-size:24px; font-weight:800; letter-spacing:-0.02em; margin:0 0 18px; }
    .band .cta-row { gap:12px; }

    footer { text-align:center; color:var(--muted); font-size:13px; margin-top:46px; }
    footer .links { margin-bottom:8px; }
    footer a { color:var(--muted); text-decoration:none; margin:0 8px; }
    footer a:hover { color:var(--fg); }
    .disclaimer { font-size:12px; opacity:.8; }

    /* ---------- Share mode ---------- */
    .share-wrap { max-width:560px; margin:0 auto; }
    .tagline { color:var(--muted); margin:2px 0 24px; font-size:15px; text-align:center; }
    iframe { border:0; border-radius:12px; width:100%; height:480px; display:block; }
    .promo { text-align:center; margin-top:18px; }
    .promo h2 { font-size:17px; margin:0 0 6px; }
    .promo p { color:var(--muted); font-size:14px; margin:0 0 16px; }
    .teaser { margin-top:14px; font-size:13px; color:var(--muted); }
    .teaser b { color:var(--fg); }

    [hidden] { display:none !important; }
    @media (max-width:680px) {
      .hero h2 { font-size:31px; }
      .steps, .features { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="entete">
        <svg viewBox="0 0 256 256" fill="currentColor"><path d="M128,24A104,104,0,1,0,232,128,104.11,104.11,0,0,0,128,24ZM72,128a8,8,0,0,1-16,0,72.08,72.08,0,0,1,72-72,8,8,0,0,1,0,16A56.06,56.06,0,0,0,72,128Zm32,0a24,24,0,1,1,24,24A24,24,0,0,1,104,128Zm24,72a8,8,0,0,1,0-16,56.06,56.06,0,0,0,56-56,8,8,0,0,1,16,0A72.08,72.08,0,0,1,128,200Z"/></svg>
        <h1>OffRadar</h1>
      </div>
      <div class="lang">
        <button id="l-fr" data-l="fr">FR</button>
        <button id="l-en" data-l="en">EN</button>
      </div>
    </div>

    <!-- ===================== MODE PARTAGE ===================== -->
    <section id="share" class="share-wrap" hidden>
      <p class="tagline" id="s-tagline"></p>
      <div class="card" id="carte-playlist"></div>
      <div class="card promo">
        <h2 id="s-promo-titre"></h2>
        <p id="s-promo-texte"></p>
        <a class="btn btn-primary btn-bloc" id="s-btn-dl" href="./offradar-extension.zip" download></a>
        <div class="teaser" id="s-teaser"></div>
      </div>
    </section>

    <!-- ===================== LANDING ===================== -->
    <main id="landing" hidden>
      <section class="hero">
        <span class="eyebrow" id="h-eyebrow"></span>
        <h2 id="h-titre"></h2>
        <p class="sub" id="h-sub"></p>
        <div class="cta-row">
          <div class="req"><i class="ph ph-crown-simple"></i><span id="h-req"></span></div>
          <div class="dl-buttons">
            <a class="btn btn-primary" id="h-dl" href="./offradar-extension.zip" download></a>
            <a class="btn btn-ghost" id="h-dl-ff" href="./offradar.xpi"></a>
          </div>
          <div class="cta-note" id="h-note"></div>
        </div>
      </section>

      <div class="section-titre" id="t-steps"></div>
      <div class="steps">
        <div class="step"><div class="num">1</div><h3 id="st1-t"></h3><p id="st1-p"></p></div>
        <div class="step"><div class="num">2</div><h3 id="st2-t"></h3><p id="st2-p"></p></div>
        <div class="step"><div class="num">3</div><h3 id="st3-t"></h3><p id="st3-p"></p></div>
      </div>

      <div class="section-titre" id="t-feat"></div>
      <div class="features">
        <div class="feat"><span class="ic"><i class="ph ph-binoculars"></i></span><h3 id="f1-t"></h3><p id="f1-p"></p></div>
        <div class="feat"><span class="ic"><i class="ph ph-sliders-horizontal"></i></span><h3 id="f2-t"></h3><p id="f2-p"></p></div>
        <div class="feat"><span class="ic"><i class="ph ph-shield-check"></i></span><h3 id="f3-t"></h3><p id="f3-p"></p></div>
        <div class="feat"><span class="ic"><i class="ph ph-share-network"></i></span><h3 id="f4-t"></h3><p id="f4-p"></p></div>
      </div>

      <div class="section-titre" id="t-faq"></div>
      <div class="faq" id="faq-list"></div>

      <div class="band">
        <h3 id="band-titre"></h3>
        <div class="cta-row">
          <div class="dl-buttons">
            <a class="btn btn-primary" id="band-dl" href="./offradar-extension.zip" download></a>
            <a class="btn btn-ghost" id="band-dl-ff" href="./offradar.xpi"></a>
          </div>
          <div class="cta-note" id="band-note"></div>
        </div>
      </div>
    </main>

    <footer>
      <div class="links">
        <a href="./privacy.html" id="foot-privacy"></a>
        <a href="mailto:hello@getoffradar.com">hello@getoffradar.com</a>
      </div>
      <div class="disclaimer" id="foot-disc"></div>
    </footer>
  </div>

  <script>
    const MARQUE = 'OffRadar';
    const T = {
      fr: {
        footDisc: 'Non affilié à Spotify. « Spotify » est une marque de Spotify AB.',
        footPrivacy: 'Confidentialité',
        dl: 'Télécharger l’extension',
        dlChrome: 'Télécharger pour Chrome',
        dlFirefox: 'Télécharger pour Firefox',
        // partage
        sTagline: 'Une playlist de découverte, rien que pour toi.',
        ouvrir: 'Ouvrir dans Spotify',
        vide: 'Lien de playlist manquant. Demande à la personne de te renvoyer le lien.',
        sPromoTitre: 'Crée tes propres playlists de découverte',
        sPromoTexte: 'Cette playlist a été générée avec ' + MARQUE + ', une extension qui crée des playlists de découverte à partir de ton écoute Spotify.',
        sTeaser: '🚀 <b>Bientôt sur le Chrome Web Store et Firefox</b>, pour une installation en un clic.',
        // landing
        eyebrow: 'Extension Chrome · Gratuite',
        heroTitre: 'De vraies découvertes musicales, pas du réchauffé',
        heroSub: 'OffRadar part de ton historique d’écoute Spotify pour dénicher tes prochains artistes préférés, et génère une playlist unique à chaque fois.',
        req: 'À savoir avant d’installer : OffRadar nécessite un <b>compte Spotify Premium</b> et un <b>compte Spotify Developer</b> (gratuit, créé en 2 min, on te guide).',
        ctaNote: '<b>Gratuit</b> · Aucune donnée collectée · Bientôt sur le Chrome Web Store',
        tSteps: 'Comment ça marche',
        st1t: 'Connecte ton Spotify', st1p: 'Connexion sécurisée en quelques clics. Rien n’est stocké chez nous. L’extension requiert un compte Spotify Developer (gratuit).',
        st2t: 'Définis tes règles', st2p: 'Ambiance, époque, notoriété, styles, dose de familiarité…',
        st3t: 'Reçois ta playlist', st3p: 'Directement dans ta bibliothèque Spotify, prête à écouter.',
        tFeat: 'Ce qui fait la différence',
        f1t: 'Vraie découverte', f1p: 'Un seul titre par artiste, anti-répétition sur tes dernières playlists.',
        f2t: 'Sur-mesure', f2p: 'Taille, ambiance, décennie, exclusion de l’explicite, familiarité.',
        f3t: '100 % privé', f3p: 'Aucun serveur, aucune collecte. Tout reste dans ton navigateur.',
        f4t: 'Partage en 2 clics', f4p: 'Fais découvrir tes pépites, aucune installation requise.',
        tFaq: 'Questions fréquentes',
        faq: [
          { q: 'Pourquoi proposer une extension plutôt qu’un site ?',
            a: 'Parce que tout se passe directement entre ton navigateur et Spotify, sans serveur intermédiaire. Tes identifiants et ton historique d’écoute ne transitent jamais par nos serveurs, il n’y en a pas. Une extension permet cette approche 100 % locale et privée, qu’un site hébergé ne pourrait pas garantir aussi simplement.' },
          { q: 'Pourquoi ai-je besoin d’un compte Spotify Developer ?',
            a: 'Spotify limite le nombre d’utilisateurs par application en mode développeur. Pour que tout le monde puisse utiliser OffRadar sans liste d’attente, chaque utilisateur crée sa propre petite application Spotify (gratuite et en 2 minutes) et y connecte OffRadar. C’est ce qui garde l’outil ouvert et indépendant.' },
          { q: 'Comment créer mon compte Spotify Developer ?',
            a: 'Va sur le <a href="https://developer.spotify.com/dashboard" target="_blank" rel="noopener">Spotify Developer Dashboard</a>, connecte-toi, clique « Create app », coche « Web API », ajoute l’URL de redirection affichée par l’extension, puis copie ton « Client ID » dans OffRadar. L’extension te guide pas à pas au premier lancement.' },
          { q: 'J’ai des suggestions d’amélioration, comment vous les partager ?',
            a: 'Avec grand plaisir, écris-nous à <a href="mailto:hello@getoffradar.com">hello@getoffradar.com</a>. Chaque retour fait évoluer OffRadar.' },
          { q: 'J’ai choisi un style mais la playlist contient des morceaux hors sujet, pourquoi ?',
            a: 'Spotify ne classe les genres qu’au niveau des artistes (pas des morceaux) et a retiré fin 2024 l’analyse audio des titres. OffRadar déduit donc le style via les genres d’artistes et les tags Last.fm : c’est performant mais parfois approximatif. Si le vivier devient trop étroit, l’extension élargit légèrement les critères pour livrer une playlist complète (elle te le signale). Astuce : combine le style avec la notoriété, ou régénère pour un autre tirage.' },
          { q: 'OffRadar est-il payant ?',
            a: 'Non, OffRadar est entièrement gratuit aujourd’hui. Il te faut seulement un compte Spotify Premium (requis par l’API Spotify) et un compte développeur Spotify gratuit.' },
          { q: 'Sur quels navigateurs ça fonctionne ?',
            a: 'Chrome et les navigateurs basés sur Chromium (Edge, Brave, Opera). Une version Firefox est prévue.' },
        ],
        bandTitre: 'Prêt à sortir des sentiers battus ?',
      },
      en: {
        footDisc: 'Not affiliated with Spotify. “Spotify” is a trademark of Spotify AB.',
        footPrivacy: 'Privacy',
        dl: 'Download the extension',
        dlChrome: 'Download for Chrome',
        dlFirefox: 'Download for Firefox',
        sTagline: 'A discovery playlist, just for you.',
        ouvrir: 'Open in Spotify',
        vide: 'Missing playlist link. Ask the sender to resend the link.',
        sPromoTitre: 'Create your own discovery playlists',
        sPromoTexte: 'This playlist was generated with ' + MARQUE + ', an extension that builds discovery playlists from your Spotify listening.',
        sTeaser: '🚀 <b>Coming soon to the Chrome Web Store and Firefox</b>, for one-click install.',
        eyebrow: 'Chrome extension · Free',
        heroTitre: 'Real musical discoveries, not reheated leftovers',
        heroSub: 'OffRadar starts from your Spotify listening history to dig out your next favorite artists, and builds a unique playlist every time.',
        req: 'Before you install: OffRadar requires a <b>Spotify Premium account</b> and a <b>Spotify Developer account</b> (free, set up in 2 min, we guide you).',
        ctaNote: '<b>Free</b> · No data collected · Coming soon to the Chrome Web Store',
        tSteps: 'How it works',
        st1t: 'Connect your Spotify', st1p: 'Secure sign-in in a few clicks. Nothing is stored on our side. The extension requires a free Spotify Developer account.',
        st2t: 'Set your rules', st2p: 'Mood, era, popularity, styles, familiarity dial…',
        st3t: 'Get your playlist', st3p: 'Right in your Spotify library, ready to play.',
        tFeat: 'What makes it different',
        f1t: 'Real discovery', f1p: 'One track per artist, anti-repeat across your recent playlists.',
        f2t: 'Made to measure', f2p: 'Size, mood, decade, explicit filter, familiarity.',
        f3t: '100% private', f3p: 'No server, no data collection. Everything stays in your browser.',
        f4t: 'Share in 2 clicks', f4p: 'Share your gems, no install needed.',
        tFaq: 'Frequently asked questions',
        faq: [
          { q: 'Why an extension rather than a website?',
            a: 'Because everything happens directly between your browser and Spotify, with no server in between. Your credentials and listening history never pass through our servers, there are none. An extension makes this fully local, private approach possible in a way a hosted website couldn’t guarantee as simply.' },
          { q: 'Why do I need a Spotify Developer account?',
            a: 'Spotify caps the number of users per app in developer mode. So that everyone can use OffRadar without a waitlist, each user creates their own small Spotify app (free, in 2 minutes) and connects OffRadar to it. That’s what keeps the tool open and independent.' },
          { q: 'How do I create my Spotify Developer account?',
            a: 'Go to the <a href="https://developer.spotify.com/dashboard" target="_blank" rel="noopener">Spotify Developer Dashboard</a>, sign in, click “Create app”, tick “Web API”, add the redirect URL shown by the extension, then copy your “Client ID” into OffRadar. The extension walks you through it on first launch.' },
          { q: 'I have improvement ideas, how can I share them?',
            a: 'Gladly, email us at <a href="mailto:hello@getoffradar.com">hello@getoffradar.com</a>. Every bit of feedback shapes OffRadar.' },
          { q: 'I picked a style but the playlist has off-topic tracks. Why?',
            a: 'Spotify only classifies genres at the artist level (not per track) and removed per-track audio analysis in late 2024. So OffRadar infers style from artist genres and Last.fm tags: powerful, but sometimes approximate. If the pool gets too narrow, the extension slightly loosens the criteria to deliver a full playlist (and tells you). Tip: combine style with popularity, or regenerate for a different draw.' },
          { q: 'Is OffRadar paid?',
            a: 'No, OffRadar is completely free today. You only need a Spotify Premium account (required by the Spotify API) and a free Spotify Developer account.' },
          { q: 'Which browsers does it work on?',
            a: 'Chrome and Chromium-based browsers (Edge, Brave, Opera). A Firefox version is planned.' },
        ],
        bandTitre: 'Ready to go off the beaten path?',
      },
    };

    const params = new URLSearchParams(location.search);
    // Un ID de playlist Spotify = exactement 22 caractères base62. On extrait ce
    // bloc et on ignore tout texte parasite éventuellement collé derrière (ex. le
    // texte promo ajouté par certaines applications de partage).
    const pRaw = params.get('p') || '';
    const pMatch = pRaw.match(/[A-Za-z0-9]{22}/);
    const pid = pMatch ? pMatch[0] : '';
    const estPartage = !!pid;
    let lang = localStorage.getItem('lang_partage') || ((navigator.language || '').toLowerCase().startsWith('fr') ? 'fr' : 'en');

    const $ = (id) => document.getElementById(id);
    function txt(id, v) { const e = $(id); if (e) e.textContent = v; }
    function html(id, v) { const e = $(id); if (e) e.innerHTML = v; }

    function rendre() {
      const t = T[lang];
      document.documentElement.lang = lang;
      $('l-fr').classList.toggle('actif', lang === 'fr');
      $('l-en').classList.toggle('actif', lang === 'en');
      txt('foot-privacy', t.footPrivacy);
      txt('foot-disc', t.footDisc);

      $('share').hidden = !estPartage;
      $('landing').hidden = estPartage;

      if (estPartage) {
        txt('s-tagline', t.sTagline);
        txt('s-promo-titre', t.sPromoTitre);
        txt('s-promo-texte', t.sPromoTexte);
        txt('s-btn-dl', t.dl);
        html('s-teaser', t.sTeaser);
        $('carte-playlist').innerHTML =
          '<iframe loading="lazy" allow="encrypted-media" src="https://open.spotify.com/embed/playlist/' + pid + '?theme=0"></iframe>' +
          '<a class="btn btn-ghost btn-bloc" style="margin-top:14px" target="_blank" rel="noopener" href="https://open.spotify.com/playlist/' + pid + '">' + t.ouvrir + '</a>';
      } else {
        txt('h-eyebrow', t.eyebrow);
        txt('h-titre', t.heroTitre);
        txt('h-sub', t.heroSub);
        html('h-req', t.req);
        txt('h-dl', t.dlChrome); txt('h-dl-ff', t.dlFirefox); html('h-note', t.ctaNote);
        txt('t-steps', t.tSteps);
        txt('st1-t', t.st1t); txt('st1-p', t.st1p);
        txt('st2-t', t.st2t); txt('st2-p', t.st2p);
        txt('st3-t', t.st3t); txt('st3-p', t.st3p);
        txt('t-feat', t.tFeat);
        txt('f1-t', t.f1t); txt('f1-p', t.f1p);
        txt('f2-t', t.f2t); txt('f2-p', t.f2p);
        txt('f3-t', t.f3t); txt('f3-p', t.f3p);
        txt('f4-t', t.f4t); txt('f4-p', t.f4p);
        txt('t-faq', t.tFaq);
        $('faq-list').innerHTML = t.faq.map(function (item) {
          return '<details><summary>' + item.q + '</summary><p class="ans">' + item.a + '</p></details>';
        }).join('');
        txt('band-titre', t.bandTitre);
        txt('band-dl', t.dlChrome); txt('band-dl-ff', t.dlFirefox); html('band-note', t.ctaNote);
      }
    }

    $('l-fr').addEventListener('click', () => { lang = 'fr'; localStorage.setItem('lang_partage', 'fr'); rendre(); });
    $('l-en').addEventListener('click', () => { lang = 'en'; localStorage.setItem('lang_partage', 'en'); rendre(); });
    rendre();
  </script>
</body>
</html>
